name: CI

on:
  push:
    branches:
    - development/prepare
    # tags:
    # - '**'
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    strategy:
      matrix:
        python-version:
        - '3.12'
        - '3.13'
        - '3.14'

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Write lock file
      run: uv lock

    - name: Commit lock file
      uses: ./.github/actions/commit-and-push
      with:
        commit-message: "chore: update lock file"

    - name: Run tox targets for ${{ matrix.python-version }}
      run: uvx --with tox-uv tox run -f py$(echo ${{ matrix.python-version }} | tr -d .)

    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      with:
        name: coverage-data-${{ matrix.python-version }}
        path: '${{ github.workspace }}/.coverage/*'
        include-hidden-files: true
        if-no-files-found: error

  
    # commit and push changes of uv build and skip ci
    - name: Commit and push changes
      uses: ./.github/actions/commit-and-push

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs: tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system coverage[toml]

      - name: Download data
        uses: actions/download-artifact@v8
        with:
          path: .coverage
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and fail if it's <100%
        run: |
          python -m coverage combine
          python -m coverage html --skip-covered --skip-empty
          python -m coverage report --fail-under=100
          echo "## Coverage summary" >> $GITHUB_STEP_SUMMARY
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: html-report
          path: htmlcov

      
      # commit and push changes of uv build and skip ci
      - name: Commit and push changes
        uses: ./.github/actions/commit-and-push

  release:
    needs: [coverage]
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv lock

      # commit and push changes of uv build and skip ci
      - name: Commit and push changes
        uses: ./.github/actions/commit-and-push