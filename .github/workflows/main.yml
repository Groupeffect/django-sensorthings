name: CI

on:
  push:
    branches:
    - main
    # tags:
    # - '**'
  pull_request:

  release:
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Build
        run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

