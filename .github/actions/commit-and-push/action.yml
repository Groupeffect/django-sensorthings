name: Commit and Push
description: Commit all changes and push to the target branch, skipping CI.

inputs:
  commit-message:
    description: The commit message to use.
    required: false
    default: "chore: update build"
  target-branch:
    description: The branch to push to.
    required: false
    default: development/prepare

runs:
  using: composite
  steps:
    - name: Commit and push changes
      shell: bash
      run: |
        git config user.name "GitHub-Actions"
        git config user.email "mail@groupeffect.de"
        git status
        # git add .
        # git commit -m "${{ inputs.commit-message }}" || echo 'auto commit'
        # git push --skip-ci
